services:
  tonevault:
    build: .
    container_name: tonevault
    ports:
      - "3000:3000"
    volumes:
      - tonevault-data:/app/data
      - /path/to/audiobooks:/audiobooks:ro
    environment:
      - TONEVAULT_HOST=0.0.0.0
      - TONEVAULT_PORT=3000
      - TONEVAULT_AUTH_SECRET=change-me-to-a-random-secret
    restart: unless-stopped

volumes:
  tonevault-data:
